<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>🔍 Twitter Checker</h2>
  
  <div class="status-bar">
    <span id="statusTeks">Menunggu data... Masukkan akun di bawah.</span>
  </div>

  <textarea id="inputArea" placeholder="Paste daftar akunmu di sini (Mendukung semua format)..."></textarea>
  <button id="btnMulai">Mulai Scan</button>

  <textarea id="outputArea" readonly placeholder="Akun yang HIDUP akan otomatis muncul di sini..."></textarea>
  <button id="btnSalin">Salin Akun Hidup</button>

  <script src="popup.js"></script>
</body>
</html>
