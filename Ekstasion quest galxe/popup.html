<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AUTO QUEST GALXE</title>
  <style>
    body { width: 300px; padding: 20px; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #1a1a2e; color: white; margin: 0; }
    h3 { margin-top: 0; color: #4ecca3; }
    p { font-size: 13px; color: #a9a9b3; margin-bottom: 15px; }
    input { width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #4ecca3; border-radius: 4px; background: #16213e; color: white; }
    button { width: 100%; background-color: #e94560; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 14px; text-transform: uppercase; }
    button:hover { background-color: #d83a54; }
  </style>
</head>
<body>
  <h3>🤖 Bot Quest Galxe</h3>
  <p>Masukkan link tugas, bot akan otomatis buka tab, Login (OKX), dan eksekusi semua tugas.</p>
  <input type="url" id="targetUrl" placeholder="https://app.galxe.com/quest/...">
  <button id="startBotBtn">MULAI GAS!</button>
  <script src="popup.js"></script>
</body>
</html>
